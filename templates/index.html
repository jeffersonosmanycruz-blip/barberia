<!DOCTYPE html>
<html>

<head>
    <title>Barbería</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            background: #d4af37;
            color: black;
            padding: 20px;
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        input, select {
            width: 80%;
            padding: 12px;
            margin: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            width: 85%;
            padding: 15px;
            margin: 10px;
            background: #d4af37;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background: white;
            color: black;
            cursor: pointer;
        }

        .card {
            background: #222;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
        }

        .danger {
            background: red;
            color: white;
        }
    </style>

</head>

<body>

<h1>💈 Barbería Pro</h1>

<div class="container">

<h2>Reservar cita</h2>

<form action="/agendar" method="POST">

    <input type="text" name="nombre" placeholder="Nombre" required>

    <input type="text" name="telefono" placeholder="Teléfono" required>

    <input type="date" name="fecha" required>

    <select name="hora" required>
        {% for h in horarios %}
            <option value="{{ h }}">{{ h }}</option>
        {% endfor %}
    </select>

    <button type="submit">Reservar</button>

</form>

<h2>📅 Citas reservadas</h2>

{% for c in citas %}
    <div class="card">
        👤 {{ c[1] }} <br>
        📅 {{ c[2] }}

        <br><br>

        <!-- FORM PARA CANCELAR -->
        <form action="/cancelar" method="POST">
            <input type="hidden" name="fecha_hora" value="{{ c[2] }}">
            <input type="text" name="telefono" placeholder="Tu teléfono para cancelar" required>
            <button class="danger" type="submit">❌ Cancelar (solo dueño)</button>
        </form>

    </div>
{% endfor %}

</div>

</body>
</html>
